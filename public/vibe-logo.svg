<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="vg" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ec4899"/>
      <stop offset="0.55" stop-color="#a855f7"/>
      <stop offset="1" stop-color="#22d3ee"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect x="4" y="4" width="56" height="56" rx="16" fill="#0a0612"/>
  <rect x="4.5" y="4.5" width="55" height="55" rx="15.5" stroke="url(#vg)" stroke-opacity="0.6"/>
  <g filter="url(#glow)">
    <!-- soundwave bars forming a "V" -->
    <rect x="14" y="28" width="5" height="18" rx="2.5" fill="url(#vg)"/>
    <rect x="23" y="20" width="5" height="30" rx="2.5" fill="url(#vg)"/>
    <rect x="32" y="12" width="5" height="44" rx="2.5" fill="url(#vg)"/>
    <rect x="41" y="20" width="5" height="30" rx="2.5" fill="url(#vg)"/>
    <rect x="50" y="28" width="5" height="18" rx="2.5" fill="url(#vg)" opacity="0.85"/>
  </g>
</svg>

name: Deploy to Vercel

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  # ──────────────────────────────────────────────
  # Lint: code-quality gate for every push / PR
  # ──────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Generate Prisma client
        run: bun run db:generate

      - name: Run ESLint
        run: bun run lint

  # ──────────────────────────────────────────────
  # Deploy Preview: Vercel preview for PRs
  # ──────────────────────────────────────────────
  deploy-preview:
    name: Deploy Preview
    needs: lint
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install Vercel CLI
        run: bun add -g vercel@latest

      - name: Pull Vercel environment (preview)
        run: vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build with Vercel (preview)
        run: vercel build --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy preview
        id: deploy
        run: |
          DEPLOY_URL=$(vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }})
          echo "deploy_url=$DEPLOY_URL" >> "$GITHUB_OUTPUT"
          echo "Preview deployed: $DEPLOY_URL"

      - name: Comment PR with preview URL
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `**Vercel Preview:** ${{ steps.deploy.outputs.deploy_url }}`
            })

  # ──────────────────────────────────────────────
  # Deploy Production: Vercel production on main push
  #
  # ⚠️  IMPORTANT NOTES:
  # • This project uses SQLite (via Prisma) which does NOT work on
  #   Vercel's serverless platform. You must migrate to a hosted
  #   database (e.g. Vercel Postgres, PlanetScale, Neon, Turso)
  #   before production deployment will function correctly.
  # • The mini-services (socket.io chat service on port 3003)
  #   require persistent WebSocket connections and cannot run on
  #   serverless. Deploy them separately to a container platform
  #   (e.g. Railway, Fly.io, Render) and point the frontend to
  #   the external service URL.
  # ──────────────────────────────────────────────
  deploy-production:
    name: Deploy Production
    needs: lint
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install Vercel CLI
        run: bun add -g vercel@latest

      - name: Pull Vercel environment (production)
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build with Vercel (production)
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to production
        id: deploy
        run: |
          DEPLOY_URL=$(vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }})
          echo "deploy_url=$DEPLOY_URL" >> "$GITHUB_OUTPUT"
          echo "Production deployed: $DEPLOY_URL"
